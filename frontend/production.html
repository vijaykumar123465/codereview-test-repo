<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Deployment</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-4xl font-bold mb-2">🚀 Production Deployment</h1>
                    <p class="text-gray-400" id="projectInfo">Loading project...</p>
                </div>
                <button onclick="window.location.href='home.html'"
                    class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg">
                    ← Back to Home
                </button>
            </div>
        </div>

        <!-- Deployment Status -->
        <div id="deploymentStatus" class="mb-8"></div>

        <!-- Action Button -->
        <div class="mb-8">
            <button onclick="startDeployment()" id="deployBtn"
                class="w-full px-8 py-6 bg-gradient-to-r from-green-500 to-blue-500 hover:from-green-600 hover:to-blue-600 rounded-xl font-bold text-2xl transition-all shadow-lg hover:shadow-xl">
                🚀 Send for Production
            </button>
        </div>

        <!-- Scan Results -->
        <div id="scanResults" class="hidden">
            <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20 mb-6">
                <h2 class="text-2xl font-bold mb-4">Scan Results</h2>
                <div id="resultsContainer"></div>
            </div>

            <!-- Files List -->
            <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
                <h2 class="text-2xl font-bold mb-4">Files Analysis</h2>
                <div id="filesList"></div>
            </div>
        </div>

        <!-- Progress Log -->
        <div class="bg-black/30 backdrop-blur-lg rounded-xl p-6 border border-white/20">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold">📋 Deployment Log</h3>
                <button onclick="clearLog()" class="text-xs px-3 py-1 bg-red-500/20 hover:bg-red-500/30 rounded">
                    Clear
                </button>
            </div>
            <div id="logContainer" class="font-mono text-xs text-green-400 h-48 overflow-y-auto space-y-1">
                <div>Ready to deploy...</div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:8000';
        let currentProject = null;

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const colors = {
                info: 'text-green-400',
                error: 'text-red-400',
                warn: 'text-yellow-400',
                success: 'text-blue-400'
            };
            const entry = document.createElement('div');
            entry.className = colors[type] || colors.info;
            entry.textContent = `[${timestamp}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        async function loadProject() {
            const projectName = localStorage.getItem('currentProject');

            if (!projectName) {
                log('No project selected', 'error');
                document.getElementById('projectInfo').textContent = 'No project selected';
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/projects/${projectName}`);
                const data = await response.json();

                if (response.ok) {
                    currentProject = data;
                    document.getElementById('projectInfo').textContent = `Project: ${data.name} (${data.path})`;
                    log(`Loaded project: ${data.name}`, 'success');
                } else {
                    log('Failed to load project', 'error');
                }
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function startDeployment() {
            if (!currentProject) {
                showToast('No project loaded', 'error');
                return;
            }

            const btn = document.getElementById('deployBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Scanning project...';
            btn.className = 'w-full px-8 py-6 bg-gray-600 rounded-xl font-bold text-2xl cursor-not-allowed';

            log('Starting deployment process...', 'info');
            log(`Scanning directory: ${currentProject.path}`, 'info');

            try {
                const response = await fetch(`${BACKEND_URL}/deploy/scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_name: currentProject.name,
                        project_path: currentProject.path
                    })
                });

                const result = await response.json();

                log('Scan completed', 'success');
                displayResults(result);

            } catch (error) {
                log(`Deployment failed: ${error.message}`, 'error');
                showToast('Deployment failed', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Send for Production';
                btn.className = 'w-full px-8 py-6 bg-gradient-to-r from-green-500 to-blue-500 hover:from-green-600 hover:to-blue-600 rounded-xl font-bold text-2xl transition-all shadow-lg hover:shadow-xl';
            }
        }

        function displayResults(result) {
            document.getElementById('scanResults').classList.remove('hidden');

            const statusDiv = document.getElementById('deploymentStatus');
            const resultsDiv = document.getElementById('resultsContainer');
            const filesDiv = document.getElementById('filesList');

            // Deployment status
            if (result.can_deploy) {
                statusDiv.innerHTML = `
                    <div class="bg-green-500/20 border-2 border-green-500 rounded-xl p-6">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="text-6xl">✅</div>
                            <div>
                                <h2 class="text-3xl font-bold text-green-300">Ready for Production!</h2>
                                <p class="text-gray-300">All tests passed. Safe to deploy.</p>
                            </div>
                        </div>
                        <button onclick="confirmDeploy()" 
                                class="w-full px-6 py-4 bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-700 hover:to-blue-700 rounded-lg font-bold text-xl">
                            ✅ Confirm Deployment
                        </button>
                    </div>
                `;
                log('✅ All checks passed - ready for production', 'success');
            } else {
                statusDiv.innerHTML = `
                    <div class="bg-red-500/20 border-2 border-red-500 rounded-xl p-6">
                        <div class="flex items-center gap-4">
                            <div class="text-6xl">🚫</div>
                            <div>
                                <h2 class="text-3xl font-bold text-red-300">Deployment Blocked</h2>
                                <p class="text-gray-300">${result.critical_count} critical issue(s) must be fixed</p>
                            </div>
                        </div>
                    </div>
                `;
                log(`🚫 Deployment blocked - ${result.critical_count} critical issues`, 'error');
            }

            // Summary
            resultsDiv.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-blue-500/10 rounded-lg p-4 border border-blue-500/30">
                        <div class="text-2xl font-bold">${result.total_files}</div>
                        <div class="text-sm text-gray-400">Total Files</div>
                    </div>
                    <div class="bg-green-500/10 rounded-lg p-4 border border-green-500/30">
                        <div class="text-2xl font-bold">${result.clean_files}</div>
                        <div class="text-sm text-gray-400">Clean Files</div>
                    </div>
                    <div class="bg-red-500/10 rounded-lg p-4 border border-red-500/30">
                        <div class="text-2xl font-bold">${result.critical_count}</div>
                        <div class="text-sm text-gray-400">Critical Issues</div>
                    </div>
                    <div class="bg-yellow-500/10 rounded-lg p-4 border border-yellow-500/30">
                        <div class="text-2xl font-bold">${result.warning_count}</div>
                        <div class="text-sm text-gray-400">Warnings</div>
                    </div>
                </div>
            `;

            // Files list
            if (result.files && result.files.length > 0) {
                filesDiv.innerHTML = result.files.map(file => {
                    const statusColor = file.has_critical ? 'red' : file.has_warnings ? 'yellow' : 'green';
                    const statusIcon = file.has_critical ? '🚫' : file.has_warnings ? '⚠️' : '✅';

                    return `
                        <div class="bg-${statusColor}-500/10 border border-${statusColor}-500/30 rounded-lg p-4 mb-3">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3 flex-1">
                                    <div class="text-2xl">${statusIcon}</div>
                                    <div class="flex-1">
                                        <div class="font-semibold">${escapeHtml(file.filename)}</div>
                                        <div class="text-sm text-gray-400 font-mono">${file.path}</div>
                                        ${file.issues > 0 ? `<div class="text-sm text-${statusColor}-300 mt-1">${file.issues} issue(s) found</div>` : ''}
                                    </div>
                                </div>
                                <button onclick='scanFile(${JSON.stringify(file.path)})' 
                                        class="px-4 py-2 bg-blue-500 hover:bg-blue-600 rounded-lg text-sm font-semibold">
                                    🔍 Scan
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function scanFile(filePath) {
            log(`Opening scan for: ${filePath}`, 'info');

            // ✅ FIX: Convert Windows "\" into safe "/"
            const safePath = filePath.replace(/\\/g, "/");

            // ✅ Store safe normalized path
            localStorage.setItem("scanFilePath", safePath);

            // ✅ Open Manual Scan page
            window.open("index.html?auto=true", "_blank");
        }


        async function confirmDeploy() {
            log('Confirming deployment...', 'success');

            try {
                const response = await fetch(`${BACKEND_URL}/deploy/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_name: currentProject.name
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    log('🎉 Successfully deployed to production!', 'success');
                    showToast('Deployed successfully!', 'success');

                    document.getElementById('deploymentStatus').innerHTML = `
                        <div class="bg-green-500/20 border-2 border-green-500 rounded-xl p-6 text-center">
                            <div class="text-8xl mb-4">🎉</div>
                            <h2 class="text-4xl font-bold text-green-300 mb-2">Deployed!</h2>
                            <p class="text-gray-300">Your project is now in production</p>
                        </div>
                    `;
                } else {
                    log('Deployment confirmation failed', 'error');
                    showToast(result.error || 'Failed to deploy', 'error');
                }
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
                showToast('Deployment error', 'error');
            }
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '<div>Log cleared</div>';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-4 rounded-lg shadow-lg z-50`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onload = loadProject;
    </script>
</body>

</html>
